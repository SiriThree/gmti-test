const pathDescriptions = {
  操纵师: "你是命运的编织者，是无形丝线的执掌者。天地万物，皆在你的牵引之下呼吸、行动、奔赴早已被悄悄写下的终点。\n\n你不必高声宣告，不必显露锋芒，只因真正的掌控从不需要喧哗。你行走于人间，却像一位俯瞰棋局的棋手，人心的摇摆、欲望的起伏、命运的转折，都在你静默的凝视中缓缓归位。\n\n你不被情绪左右，不被世俗捆绑，意志即是秩序，目光即是方向。世人追逐潮流，而你定义潮流；世人寻求答案，而你书写答案。你的力量藏于无声，藏于无形，藏于每一个被你轻轻拨动的瞬间。当真正的考验降临，你将以最优雅的姿态，让世界重回你意志所指的轨迹。",

// 用 let 定义当前题目数组（支持重新赋值）
let questions = [...originalQuestions];

// 随机打乱数组
function shuffleArray(array) {
  const newArray = [...array];
  for (let i = newArray.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
  }
  return newArray;
}

function calculateMaxScores() {
  let maxScores = {};
  Object.keys(pathDescriptions).forEach(path => maxScores[path] = 0);
  originalQuestions.forEach(q => {
    q.options.forEach(opt => {
      if (opt.paths) Object.entries(opt.paths).forEach(([k, v]) => maxScores[k] += v);
    });
  });
  return maxScores;
}
const maxScores = calculateMaxScores();

};

function showPage(id) {
  document.getElementById("home-page").classList.add("hidden");
  document.getElementById("test-page").classList.add("hidden");
  document.getElementById("result-page").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
}

function loadQuestion() {
  const idx = userState.current;
  const q = questions[idx];
  document.getElementById("question-title").textContent = q.title;
  document.getElementById("progress").textContent = `进度：${idx+1}/25`;
  const optEl = document.getElementById("options");
  optEl.innerHTML = "";

  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "bg-purple/10 hover:bg-purple/30 p-4 rounded-xl text-left transition-all";
    if (userState.answers[idx] === i) {
      btn.classList.add("bg-purple/50");
    }
    btn.innerHTML = `${String.fromCharCode(65+i)}. ${opt.text}`;
    btn.onclick = () => {
      userState.answers[idx] = i;
      recalculateAll();
      
      if (userState.current < questions.length - 1) {
        userState.current++;
        loadQuestion();
      } else {
        showResult();
      }
    };
    optEl.appendChild(btn);
  });
}

function recalculateAll() {
  let mbti = {E:0,I:0,N:0,S:0,T:0,F:0,J:0,P:0};
  let paths = Object.fromEntries(Object.keys(pathDescriptions).map(p => [p, 0]));
  userState.answers.forEach((ans, qidx) => {
    if (ans === null) return;
    const opt = questions[qidx].options[ans];
    Object.entries(opt.mbti).forEach(([k, v]) => mbti[k] += v);
    Object.entries(opt.paths).forEach(([k, v]) => paths[k] += v);
  });
  userState.mbti = mbti;
  userState.paths = paths;
}

    paths: Object.fromEntries(Object.keys(pathDescriptions).map(p => [p, 0])),
    current: 0,
    answers: Array(originalQuestions.length).fill(null)
  };
  showPage("test-page");
  loadQuestion();
};

document.getElementById("prev-btn").onclick = () => {
  if (userState.current > 0) {
    userState.current--;
    loadQuestion();
  }
};

document.getElementById("next-btn").onclick = () => {
  if (userState.current < questions.length - 1) {
    userState.current++;
    loadQuestion();
  } else {
    showResult();
  }
};

function showResult() {
  showPage("result-page");
  const mbti = (userState.mbti.E>userState.mbti.I?"E":"I") +
              (userState.mbti.N>userState.mbti.S?"N":"S") +
              (userState.mbti.T>userState.mbti.F?"T":"F") +
              (userState.mbti.J>userState.mbti.P?"J":"P");
  const [path, score] = Object.entries(userState.paths).sort((a,b)=>b[1]-a[1])[0];
  const percent = ((score / maxScores[path]) * 100).toFixed(1);
  
  document.getElementById("main-path").textContent = path;
  document.getElementById("path-score").textContent = `途径契合度：${percent}%`;
  document.getElementById("path-desc").textContent = pathDescriptions[path];
  document.getElementById("result-mbti").textContent = mbti;
 
  document.getElementById("path-img").src = `./images/${path}.png`;
}

// ✅ 修复：补全重启按钮代码
document.getElementById("restart-btn").onclick = () => {
  showPage("home-page");
};
</script>
</body>
</html>
